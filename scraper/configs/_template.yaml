# OmniScraper — Site Config Template
# Generated by: omniscraper init-config
# Docs: https://github.com/K-BEL/omniscraper

name: "my_site"
base_url: "https://example.com"
fetcher: "stealthy"        # basic | stealthy | dynamic
headless: true

# Optional URL template with placeholders
# url_template:
#   pattern: "{base_url}/{city}/{category}"
#   params:
#     sort: "newest"

# CSS selector for each listing card on the page
listing_container: ".listing-card"

# Field mapping — each key becomes a column in your export
fields:
  title:
    selector: ".title::text"
  price:
    selector: ".price::text"
    transform: "clean_price"    # strip currency symbols, parse as number
  location:
    selector: ".location::text"
  image:
    selector: "img::attr(src)"
  link:
    selector: "a::attr(href)"
  description:
    selector: ".description::text"

# Pagination settings
pagination:
  next_page: ".next-page a::attr(href)"   # CSS selector for next-page link
  # page_param: "page"                    # OR use query param pagination
  max_pages: 5

# Politeness delay between page fetches (seconds)
delay: 2.0
